<div id="module-blog" class="module-content">
    <div id="tab1" class="tab-content active">
        <h2>💡 Propozycje tematów</h2>
        <div class="box-option">
            <h3 style="margin-top: 0;">Opcja A: Automatyczne Trendy</h3>
            <button class="btn-primary" onclick="generateIdeas('')">🔥 Generuj z trendów</button>
        </div>
        <div class="box-option">
            <h3 style="margin-top: 0;">Opcja B: Twój pomysł</h3>
            <input type="text" id="idea-input" placeholder="np. sukienka na szybką kawę">
            <button class="btn-primary" onclick="generateIdeas(document.getElementById('idea-input').value)">💡 Generuj</button>
        </div>
        <div id="loader-1" class="loader">⏳ Pracuję...</div>
        <div id="ideas-result" style="margin-top: 20px;"></div>
    </div>

    <div id="tab2" class="tab-content">
        <h2>✍️ Kreator Treści</h2>
        <input type="text" id="topic-input" oninput="saveDraft()" placeholder="Wybrany temat artykułu">
        <textarea id="guidelines-input" rows="2" placeholder="Dodatkowe wytyczne (opcjonalnie)" oninput="saveDraft()"></textarea>
        <div style="background: #eef2f5; padding: 15px; border-radius: 5px; margin-bottom: 15px; border-left: 4px solid #0066cc;">
            <input type="text" id="context-product-ids" placeholder="ID produktów do opisu (np. 16216, 16357)" oninput="syncProductIds()">
        </div>
        <button class="btn-primary" onclick="generatePlan()">📋 1. Wygeneruj Szkielet</button>
        <div id="loader-plan" class="loader">⏳ Tworzę strukturę...</div>
        
        <div id="plan-section" style="display: none; margin-top: 25px; padding: 20px; background: #f4f9ff;">
            <textarea id="plan-result" rows="10" oninput="saveDraft()" style="font-family: monospace; font-size: 14px; background: #fff;"></textarea>
            <button class="btn-primary" onclick="generateArticleFromPlan()" style="background: #0066cc; margin-top: 10px;">🚀 2. Napisz Artykuł</button>
        </div>

        <div id="loader-2" class="loader">⏳ Piszę obszerny artykuł...</div>
        <div id="article-section" style="display: none; margin-top: 30px;">
            <h3 style="display: flex; justify-content: space-between;">📝 Artykuł <span id="char-counter" class="counter-badge">0 znaków</span></h3>
            <div id="article-result" class="result-box" contenteditable="true" oninput="handleArticleEdit()"></div>
            <div style="display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap;">
                <button class="btn-primary btn-quick" onclick="quickRevise('Zrób tekst bardziej na luzie.')">🛹 Luzacki vibe</button>
                <button class="btn-primary btn-quick" onclick="quickRevise('Skróć tekst o około 20%.')">✂️ Skróć o 20%</button>
            </div>
            <input type="text" id="revision-input" placeholder="Własne uwagi...">
            <div style="display: flex; justify-content: space-between;">
                <button class="btn-primary" onclick="reviseArticle()" style="background:#555; border:none;">🔄 Nanieś poprawki</button>
                <button class="btn-primary" onclick="switchTab('tab3')" style="background: #28a745;">✅ Do Publikacji ➜</button>
            </div>
        </div>
    </div>

    <div id="tab3" class="tab-content">
        <h2>⚙️ Publikacja</h2>
        <div class="row">
            <div class="col">
                <label>Tytuł wpisu:</label><input type="text" id="pub-title" oninput="saveDraft()">
                <label>Lead wpisu:</label><textarea id="pub-lead" rows="4" oninput="saveDraft()"></textarea>
                <label>ID polecanych:</label><input type="text" id="pub-rec-ids" oninput="saveDraft()">
                <label>ID do HTML:</label><input type="text" id="pub-html-ids" oninput="saveDraft()">
            </div>
            <div class="col">
                <label>ID na Kolaż:</label><input type="text" id="pub-collage-ids">
                <button class="btn-primary" onclick="generateCollage()">🖼️ Generuj Kolaż</button>
                <div id="loader-collage" class="loader">⏳ Pobieram zdjęcia...</div>
                <img id="collage-preview" src="" style="width: 100%; margin-top: 15px; display:none;">
            </div>
        </div>
        <button class="btn-primary" onclick="generateHtml()" style="margin-top: 20px;">✨ Konwertuj na HTML</button>
        <div id="loader-html" class="loader">⏳ Tworzę kod HTML...</div>
        <div id="html-section" style="display: none; margin-top: 20px;">
            <textarea id="html-result" rows="8" readonly></textarea>
            <button class="btn-primary" onclick="publishToIdosell()" style="width: 100%; background: #28a745; margin-top: 15px;">🚀 OPUBLIKUJ W IDOSELL</button>
            <div id="loader-publish" class="loader" style="text-align: center;">⏳ Wysyłam...</div>
        </div>
    </div>
</div>
